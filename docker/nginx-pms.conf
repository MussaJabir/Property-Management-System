#
# PMS — host nginx server block.
#
# Lives alongside the existing lms.bjptechnologies.co.tz and other server
# blocks. Drop into /etc/nginx/conf.d/pms.conf and `sudo systemctl reload nginx`.
#
# Architecture:
#   client → host nginx (443, TLS) → http://127.0.0.1:9080 → in-container
#   nginx → php-fpm. Both nginx hops are lightweight; the in-container one
#   serves static assets straight from the image so no bind mount is needed.
#
# Pre-reqs:
#   1. DNS A record `pms.bjptechnologies.co.tz` → this server's public IP
#   2. PMS app container is running and exposes 127.0.0.1:9080 on the host
#   3. Certbot issued certs for the domain:
#         sudo certbot --nginx -d pms.bjptechnologies.co.tz
#      Certbot will rewrite ssl_certificate paths in this file when it runs.

server {
    listen 80;
    server_name pms.bjptechnologies.co.tz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name pms.bjptechnologies.co.tz;

    # Certbot will swap these when you run `sudo certbot --nginx`.
    ssl_certificate /etc/letsencrypt/live/pms.bjptechnologies.co.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pms.bjptechnologies.co.tz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/pms_access.log;
    error_log  /var/log/nginx/pms_error.log;

    client_max_body_size 16M;

    location / {
        proxy_pass http://127.0.0.1:9080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Livewire long-polling / Filament real-time pieces want these.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Block dotfile access (but allow .well-known for ACME challenges).
    location ~ /\.(?!well-known).* { deny all; }
}
