; Tight PHP-FPM pool sizing for a 1 GB host.
; Each child ~30-50 MB; 5 max children = ~250 MB worst case, leaves headroom
; for Postgres + Redis + the existing nginx/php-fpm on the host.
;
; If you upgrade the box to 4 GB+, bump pm.max_children to 15-20.

[www]
user = www-data
group = www-data

listen = 9000

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

clear_env = no

; Surface fatal worker failures to docker logs.
catch_workers_output = yes
decorate_workers_output = no
