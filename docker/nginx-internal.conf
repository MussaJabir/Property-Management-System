# In-container nginx — runs alongside php-fpm under supervisord.
# Host nginx proxy-passes here; this nginx serves Laravel via FastCGI and
# any static files (public/build/*, vendor assets, …) straight from disk.

user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 30;
    client_max_body_size 16M;

    access_log /dev/stdout;

    upstream php_fpm {
        server 127.0.0.1:9000;
    }

    server {
        listen 8080;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Cache static assets aggressively — they're content-hashed by Vite.
        location ~* \.(css|js|svg|woff2?|ttf|eot|png|jpe?g|gif|webp|ico)$ {
            try_files $uri =404;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # Everything else → Laravel front controller.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php_fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Host nginx forwarded these; pass to PHP.
            fastcgi_param HTTPS on;
            fastcgi_param HTTP_X_FORWARDED_PROTO https;
            fastcgi_read_timeout 120;
        }

        location ~ /\.(?!well-known) { deny all; }
    }
}
