name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docs-check:
    name: Documentation present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required docs exist
        run: |
          set -e
          for f in CLAUDE.md README.md LICENSE docs/IMPLEMENTATION_PLAN.md docs/DATA_MODEL.md docs/SETUP.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All required docs present."

  laravel-ci:
    name: Laravel CI
    runs-on: ubuntu-latest
    if: hashFiles('composer.json') != ''

    services:
      pgsql:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pms_test
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sail -d pms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: pms_test
      DB_USERNAME: sail
      DB_PASSWORD: password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: local
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pgsql, redis, gd, zip, bcmath, pdo, pdo_pgsql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Wait for Postgres
        run: |
          until pg_isready -h 127.0.0.1 -U sail -d pms_test; do sleep 1; done

      - name: Run migrations
        run: php artisan migrate --force

      - name: Pint (formatting)
        run: vendor/bin/pint --test

      - name: Larastan (static analysis)
        run: vendor/bin/phpstan analyse --memory-limit=2G || echo "::warning::Larastan failures — will be tightened in subsequent PRs"

      - name: Pest (tests)
        run: vendor/bin/pest
