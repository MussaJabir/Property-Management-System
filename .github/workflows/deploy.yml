name: Deploy to production

# Manual trigger only — clicking "Run workflow" on the Actions tab.
# When the demo is stable and we have monitoring, switch to on: push: main.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA). Defaults to main.'
        required: false
        default: 'main'

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  # GHCR requires lowercase repo paths; hardcode to match docker-compose.production.yml.
  IMAGE: ghcr.io/mussajabir/pms

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Resolve short SHA
        id: meta
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (tagged + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/pms

            # Pin the deployed SHA so docker compose pulls the right tag.
            export PMS_TAG="${{ needs.build-and-push.outputs.sha }}"

            # Authenticate to GHCR if image is private.
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin || true

            # Pull the new image and roll the stack.
            docker compose -f docker-compose.production.yml --env-file .env pull
            docker compose -f docker-compose.production.yml --env-file .env up -d

            # Wait for the app container to be healthy. Uses if/then/fi
            # (NOT `[ ] && break`) because under `set -e` + remote bash, a
            # failed test in a && short-circuit can spuriously exit the script.
            for i in $(seq 1 60); do
              status=$(docker inspect --format='{{.State.Health.Status}}' pms-app-1 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "app is healthy after ${i} polls"
                break
              fi
              echo "waiting for app health… ($status)"
              sleep 2
            done
            if [ "$status" != "healthy" ]; then
              echo "❌ app container never became healthy. Last status: $status"
              docker compose -f docker-compose.production.yml logs --tail=100 app
              exit 1
            fi

            # Run migrations against the new image.
            docker compose -f docker-compose.production.yml --env-file .env exec -T app \
              php artisan migrate --force

            # Publish Filament's bundled CSS/JS/fonts into public/. Already baked
            # into the image, but re-publishing here keeps things in sync when a
            # Filament plugin is added without a fresh image rebuild.
            docker compose -f docker-compose.production.yml --env-file .env exec -T app \
              php artisan filament:assets

            # Cache config/routes/views for the running image.
            docker compose -f docker-compose.production.yml --env-file .env exec -T app \
              php artisan config:cache
            docker compose -f docker-compose.production.yml --env-file .env exec -T app \
              php artisan route:cache
            docker compose -f docker-compose.production.yml --env-file .env exec -T app \
              php artisan view:cache

            # Prune dangling images to reclaim disk on the small box.
            docker image prune -af --filter "until=24h" || true

            echo "✅ Deployed ${PMS_TAG}"
